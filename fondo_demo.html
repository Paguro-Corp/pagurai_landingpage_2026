<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fondo Interactivo Standalone - Pagurai</title>
  <style>
    /* ==========================================================================
       1. VARIABLES DE DISEÑO (Personaliza los colores aquí)
       ========================================================================== */
    :root {
      --bg-color: #0a0a0f;        /* Color de fondo base ultra oscuro */
      --accent-rgb: 0, 152, 255;  /* Color de acento de los puntos (RGB) - Azul eléctrico */
      
      /* Colores para las luces difusas de fondo (Glows) */
      --glow-1: rgba(0, 152, 255, 0.12); /* Brillo superior */
      --glow-2: rgba(99, 102, 241, 0.08); /* Brillo lateral izquierdo */
      --glow-3: rgba(0, 152, 255, 0.08);  /* Brillo lateral derecho */
    }

    /* Reset básico para visualización de pantalla completa */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      overflow-x: hidden; /* Evita scrolls horizontales no deseados */
    }

    /* ==========================================================================
       2. ESTILOS DE CAPAS DE FONDO (Para llevar a tu hoja de estilos CSS)
       ========================================================================== */
    
    /* Capa 1: Fondo de color sólido e inmutable */
    .bg-cover {
      position: fixed;
      inset: 0;
      background-color: var(--bg-color);
      z-index: -10;
      pointer-events: none;
    }

    /* Capa 2: Acentos y Brillos Radiales Degradados (Aportan profundidad) */
    .bg-glows {
      position: fixed;
      inset: 0;
      z-index: -9;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 20%, var(--glow-1), transparent 35%),
        radial-gradient(circle at 15% 65%, var(--glow-2), transparent 30%),
        radial-gradient(circle at 85% 45%, var(--glow-3), transparent 28%);
    }

    /* Capa 3: Contenedor del Canvas de la Matriz de Puntos */
    .vw-dot-bg {
      position: fixed;
      inset: 0;
      z-index: -8;
      pointer-events: none;
    }

    .vw-dot-bg canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Capa 4: Degradado de desvanecimiento superior, inferior y central */
    /* Ayuda a fundir los puntos suavemente con el fondo oscuro */
    .vw-dot-fade {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 58% at 50% 45%, transparent 26%, var(--bg-color) 82%),
        linear-gradient(180deg, var(--bg-color) 0%, transparent 14%, transparent 84%, var(--bg-color) 100%);
    }
  </style>
</head>
<body>

  <!-- ==========================================================================
       ESTRUCTURA HTML A COPIAR
       Copia estas 3 etiquetas div y colócalas justo debajo de tu etiqueta <body>.
       Están diseñadas con posición fija ('fixed') y z-index negativo para quedar
       automáticamente por debajo de cualquier texto, botón o estructura que pongas.
       ========================================================================== -->

  <!-- Capa 1: Fondo Sólido -->
  <div class="bg-cover"></div>

  <!-- Capa 2: Brillos Radiales (Glows) -->
  <div class="bg-glows"></div>

  <!-- Capa 3: Canvas de Partículas / Matriz de Puntos -->
  <div class="vw-dot-bg">
    <canvas id="matrix-canvas"></canvas>
    <div class="vw-dot-fade"></div>
  </div>

  <!-- ==========================================================================
       CÓDIGO JAVASCRIPT A COPIAR
       Copia este bloque de script y agrégalo al final del body en tu HTML
       o en un archivo JS independiente de tu nuevo proyecto.
       ========================================================================== -->
  <script>
    (function () {
      'use strict';

      function createDotMatrix(canvas, parentSection, revealFromCenter) {
        if (!canvas || !parentSection) return;
        var ctx = canvas.getContext('2d');
        if (!ctx) return;
        
        var GRID = 20; // Separación en píxeles entre cada punto
        var DOT_R = 1.5; // Radio en píxeles de cada punto
        
        // Obtener el color de acento de las variables CSS de forma dinâmica
        var style = getComputedStyle(document.documentElement);
        var accentString = style.getPropertyValue('--accent-rgb').trim() || '0, 152, 255';
        var ACCENT_COLOR = accentString.split(',').map(Number);
        
        var dots = [];
        var time = 0;
        var raf;

        // Generador pseudoaleatorio estable basado en coordenadas para evitar patrones lineales idénticos
        function hash(x, y) {
          return ((Math.sin(x * 127.1 + y * 311.7) * 43758.5453123) % 1 + 1) % 1;
        }

        // Redimensionamiento adaptativo del canvas respetando la densidad de píxeles (HiDPI / Retina)
        function resize() {
          var dpr = window.devicePixelRatio || 1;
          var rect = parentSection.getBoundingClientRect();
          canvas.width = rect.width * dpr;
          canvas.height = rect.height * dpr;
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          
          dots = [];
          var cols = Math.ceil(rect.width / GRID) + 1;
          var rows = Math.ceil(rect.height / GRID) + 1;
          
          for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
              dots.push({
                x: c * GRID + GRID / 2,
                y: r * GRID + GRID / 2,
                seed: hash(c, r),
                delay: hash(c + 0.5, r + 0.5)
              });
            }
          }
        }

        // Bucle de renderizado animado con micro-parpadeo orgánico
        function draw() {
          var rect = parentSection.getBoundingClientRect();
          ctx.clearRect(0, 0, rect.width, rect.height);
          time += 0.016; // Incremento de tiempo aproximado a 60fps

          var cx = rect.width / 2;
          var cy = rect.height / 2;
          var maxDist = Math.sqrt(cx * cx + cy * cy) || 1;

          for (var i = 0; i < dots.length; i++) {
            var d = dots[i];
            
            // Fórmulas trigonométricas para un parpadeo dinámico asíncrono
            var flicker = Math.sin(time * 3.5 + d.seed * 50) * 0.5 + 0.5;
            var phase = Math.sin(time * 1.5 + d.delay * 12) * 0.5 + 0.5;
            var blink = Math.sin(time * 1.8 + d.seed * 100 + d.delay * 60);
            var blinkOn = blink > (d.seed > 0.7 ? -0.4 : 0.1) ? 1 : 0;
            var baseOpacity;
            
            // Asignación de tres niveles de brillo según la semilla pseudoaleatoria
            if (d.seed > 0.85) {
              baseOpacity = (0.35 + flicker * 0.3) * blinkOn;
            } else if (d.seed > 0.6) {
              baseOpacity = (0.15 + phase * 0.15) * blinkOn;
            } else {
              baseOpacity = (0.04 + flicker * 0.06) * blinkOn;
            }
            
            var opacity = baseOpacity;
            
            // Animación de entrada opcional (Revelado radial desde el centro hacia afuera en el inicio)
            if (revealFromCenter) {
              var dist = Math.sqrt(Math.pow(d.x - cx, 2) + Math.pow(d.y - cy, 2));
              var revealThreshold = (dist / maxDist) * 3 + d.delay * 0.8;
              var revealProgress = Math.max(0, Math.min(1, (time * 1.2 - revealThreshold)));
              opacity = baseOpacity * revealProgress;
            }
            
            if (opacity < 0.01) continue;
            
            // Un 8% de los puntos adquieren el color de acento, el resto son blancos
            var rgb = d.seed > 0.92 ? ACCENT_COLOR : [255, 255, 255];
            
            ctx.beginPath();
            ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + opacity + ')';
            ctx.fill();
          }
          raf = requestAnimationFrame(draw);
        }

        // Inicialización y eventos
        resize();
        draw();
        window.addEventListener('resize', resize);

        // Optimización de rendimiento: Detener animación cuando el fondo no es visible en pantalla
        if ('IntersectionObserver' in window) {
          var active = true;
          var observer = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
              if (!entry.isIntersecting && active) {
                cancelAnimationFrame(raf);
                active = false;
              } else if (entry.isIntersecting && !active) {
                active = true;
                draw();
              }
            });
          }, { threshold: 0 });
          observer.observe(parentSection);
        }
      }

      // Ejecutar inicialización vinculándola al body y activando el efecto de entrada radial
      var canvas = document.getElementById('matrix-canvas');
      createDotMatrix(canvas, document.body, true);
    })();
  </script>
</body>
</html>
