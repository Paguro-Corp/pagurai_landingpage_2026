<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demostración de Fondo Premium - Pagurai</title>
  <style>
    /* Reset de estilos básicos */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body, html {
      width: 100%;
      height: 100%;
      background-color: #000000;
      color: #ffffff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
    }

    /* 1. Capa de Fondo Fijo */
    .bg-cover {
      position: fixed;
      inset: 0;
      background-color: #000000;
      z-index: -10;
    }

    /* 2. Capa de Acentos y Brillos Radiales (Glows) */
    .bg-glows {
      position: fixed;
      inset: 0;
      z-index: -9;
      background:
        radial-gradient(circle at 50% 20%, rgba(0, 152, 255, 0.12), transparent 35%),
        radial-gradient(circle at 15% 65%, rgba(99, 102, 241, 0.08), transparent 30%),
        radial-gradient(circle at 85% 45%, rgba(0, 152, 255, 0.08), transparent 28%);
      pointer-events: none;
    }

    /* 3. Contenedor de la Matriz de Puntos (Canvas) */
    .vw-dot-bg {
      position: fixed;
      inset: 0;
      z-index: -8;
      pointer-events: none;
    }

    .vw-dot-bg canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Difuminado suave para fundir el canvas con el fondo */
    .vw-dot-fade {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 58% at 50% 45%, transparent 26%, #0a0a0f 82%),
        linear-gradient(180deg, #0a0a0f 0%, transparent 14%, transparent 84%, #0a0a0f 100%);
    }

    /* Contenido de demostración centrado */
    .demo-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      text-align: center;
      padding: 20px;
    }

    .demo-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 152, 255, 0.15);
      border-radius: 24px;
      padding: 40px;
      max-width: 500px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      background: linear-gradient(90deg, #0098FF, #4DB8FF);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: rgba(243, 244, 246, 0.72);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btn {
      display: inline-block;
      font-weight: 700;
      font-size: 14px;
      color: #ffffff;
      background: #0055FF;
      border: 1.5px solid rgba(0, 210, 255, 0.6);
      padding: 14px 28px;
      border-radius: 99px;
      text-decoration: none;
      box-shadow: 0 0 15px rgba(0, 85, 255, 0.4);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0, 85, 255, 0.7);
      background: #3388FF;
    }
  </style>
</head>
<body>

  <!-- Capa 1: Fondo Sólido Fijo -->
  <div class="bg-cover"></div>

  <!-- Capa 2: Acentos y Brillos Radiales (Glows) -->
  <div class="bg-glows"></div>

  <!-- Capa 3: Matriz de Puntos Interactiva (Canvas Particles) -->
  <div class="vw-dot-bg">
    <canvas id="matrix-canvas"></canvas>
    <div class="vw-dot-fade"></div>
  </div>

  <!-- Contenido de Demostración Centrado -->
  <div class="demo-content">
    <div class="demo-card">
      <h1>Fondo Duplicado</h1>
      <p>Este archivo contiene el fondo oscuro fijo, las luces radiales en degradado y el canvas dinámico con el algoritmo de parpadeo neón de Pagurai.</p>
      <a href="#" class="btn">¡Listo para copiar!</a>
    </div>
  </div>

  <script>
    (function () {
      'use strict';

      function createDotMatrix(canvas, parentSection) {
        if (!canvas || !parentSection) return;
        var ctx = canvas.getContext('2d');
        if (!ctx) return;
        
        var GRID = 20; // Espaciado entre puntos en píxeles
        var DOT_R = 1.5; // Radio de cada punto
        var ACCENT_COLOR = [0, 152, 255]; // Color del punto de acento (Azul)
        var dots = [];
        var time = 0;
        var raf;

        // Función pseudoaleatoria estable basada en coordenadas
        function hash(x, y) {
          return ((Math.sin(x * 127.1 + y * 311.7) * 43758.5453123) % 1 + 1) % 1;
        }

        // Ajustar el tamaño del canvas al contenedor
        function resize() {
          var dpr = window.devicePixelRatio || 1;
          var rect = parentSection.getBoundingClientRect();
          canvas.width = rect.width * dpr;
          canvas.height = rect.height * dpr;
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          dots = [];
          var cols = Math.ceil(rect.width / GRID) + 1;
          var rows = Math.ceil(rect.height / GRID) + 1;
          for (var r = 0; r < rows; r++) {
            for (var c = 0; c < cols; c++) {
              dots.push({
                x: c * GRID + GRID / 2,
                y: r * GRID + GRID / 2,
                seed: hash(c, r),
                delay: hash(c + 0.5, r + 0.5)
              });
            }
          }
        }

        // Renderizado interactivo
        function draw() {
          var rect = parentSection.getBoundingClientRect();
          ctx.clearRect(0, 0, rect.width, rect.height);
          time += 0.016;

          for (var i = 0; i < dots.length; i++) {
            var d = dots[i];
            var flicker = Math.sin(time * 3.5 + d.seed * 50) * 0.5 + 0.5;
            var phase = Math.sin(time * 1.5 + d.delay * 12) * 0.5 + 0.5;
            var blink = Math.sin(time * 1.8 + d.seed * 100 + d.delay * 60);
            var blinkOn = blink > (d.seed > 0.7 ? -0.4 : 0.1) ? 1 : 0;
            var opacity;
            
            if (d.seed > 0.85) {
              opacity = (0.35 + flicker * 0.3) * blinkOn;
            } else if (d.seed > 0.6) {
              opacity = (0.15 + phase * 0.15) * blinkOn;
            } else {
              opacity = (0.04 + flicker * 0.06) * blinkOn;
            }
            
            if (opacity < 0.01) continue;
            
            var rgb = d.seed > 0.92 ? ACCENT_COLOR : [255, 255, 255];
            ctx.beginPath();
            ctx.arc(d.x, d.y, DOT_R, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ',' + opacity + ')';
            ctx.fill();
          }
          raf = requestAnimationFrame(draw);
        }

        resize();
        draw();
        window.addEventListener('resize', resize);
      }

      // Inicialización asociando el canvas con el cuerpo del documento
      var canvas = document.getElementById('matrix-canvas');
      createDotMatrix(canvas, document.body);
    })();
  </script>
</body>
</html>
